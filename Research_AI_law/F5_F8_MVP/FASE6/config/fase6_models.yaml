version: "0.1"
fecha: "2026-05-07"

ridge:
  alpha: 1.0
  random_state: 42

lasso:
  alpha: 0.1
  max_iter: 10000
  random_state: 42

random_forest:
  n_estimators: 300
  max_depth: 4
  min_samples_leaf: 3
  random_state: 42

gradient_boosting:
  n_estimators: 200
  max_depth: 3
  learning_rate: 0.05
  random_state: 42

logistic:
  penalty: l2
  C: 1.0
  max_iter: 1000
  class_weight: balanced
  random_state: 42

bootstrap:
  n_iterations: 2000
  ci_method: BCa
  random_state: 42

cv:
  k_fold: 5
  n_repeats: 10
  stratify_by: region

fdr:
  method: benjamini_hochberg
  alpha: 0.05
