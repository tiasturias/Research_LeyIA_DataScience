# ============================================================
# DECISIONES Y CONTRATOS PARA FASE 5 — Feature Engineering
# Fase 4 EDA Principal — Research_AI_law
# ============================================================
#
# NOTA METODOLOGICA CRITICA:
# Este documento NO pre-decide Y, X1 ni X2.
# Hace dos cosas distintas y complementarias:
#
# (1) PREREGISTRA el universo de variables a explorar en Fase 5.
#     Esto es BUENA practica (anti p-hacking): declara antes de
#     hacer feature engineering que variables son candidatas
#     para cada rol, segun evidencia del EDA. Si Fase 5 descubre
#     algo fuera de este universo, debe documentarlo como post-hoc.
#
# (2) FIJA principios del proceso (transformaciones, submuestras,
#     restricciones), que si requieren firma humana porque afectan
#     toda la pipeline.
#
# La asignacion de roles causales finales (cual es LA Y, cual es
# EL X1) es responsabilidad de Fase 6 (Modelado), no de este
# documento. Fase 5 prepara features para multiples escenarios;
# Fase 6 elige con criterios estadisticos y sustantivos explicitos.
# ============================================================

version: '1.0'
fecha: '2026-05-06'
estado_firma_humana: APROBADO_PROCESO_NO_VARIABLES — 2026-05-06
nota_firma: >
  El investigador aprueba los PRINCIPIOS del proceso (restricciones,
  transformaciones, submuestras, universo de exploracion preregistrado).
  No aprueba ni pre-selecciona Y/X1/X2 finales — eso es Fase 6.

# ============================================================
