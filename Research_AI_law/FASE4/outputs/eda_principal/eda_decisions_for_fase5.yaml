# ============================================================
# SECCION 2: SUBMUESTRAS — SI requiere aprobacion del proceso
# (los umbrales fueron preregistrados en thresholds.yaml)
# ============================================================

submuestras_para_multiverse_analysis:
  nota: >
    Fase 5 prepara features para TODAS las submuestras.
    Fase 6 modela con cada una. Fase 7 compara resultados.
    Ninguna submuestra es "la correcta" a priori.
  orden_de_preparacion:
    - regulada          # cuello de botella IAPP (~28 paises), maxima relevancia sustantiva
    - oecd_plus_latam   # defensible internacionalmente, incluye Chile
    - densa_60          # balance cobertura/N
    - densa_80          # maxima calidad de datos, N mas bajo
    - comparable_chile  # peer group estadistico de Chile
    - full              # universo completo para descripcion

